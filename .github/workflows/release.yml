name: Release

on:
  push:
    tags: ['v*']
  # Manual dispatch — useful for validating desktop builds between tagged
  # releases without creating a GitHub Release (no tag = no release created).
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cellforge-linux-x64
            binary: cellforge-server
            desktop: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cellforge-linux-arm64
            binary: cellforge-server
            desktop: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cellforge-macos-x64
            binary: cellforge-server
            desktop: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cellforge-macos-arm64
            binary: cellforge-server
            desktop: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cellforge-windows-x64
            binary: cellforge-server.exe
            desktop: true
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: cellforge-windows-arm64
            binary: cellforge-server.exe
            desktop: true

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # --- Platform setup ---

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install desktop dependencies (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      # --- Build ---

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} -p cellforge-server --features embed-frontend

      - name: Build desktop app
        if: matrix.desktop
        run: cargo build --release --target ${{ matrix.target }} -p cellforge-app

      # --- Package: Linux AppImage ---

      - name: Package AppImage (Linux)
        if: matrix.desktop && runner.os == 'Linux'
        continue-on-error: true
        run: |
          # Download and EXTRACT linuxdeploy (no FUSE on CI runners)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-extracted

          # Download GTK plugin
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

          # Build AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.target }}/release/cellforge-app AppDir/usr/bin/cellforge-app
          chmod +x AppDir/usr/bin/cellforge-app
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/cellforge.png

          # Copy webkit2gtk helper binaries (WebKitNetworkProcess, WebKitWebProcess)
          # linuxdeploy-plugin-gtk copies the libraries but misses these helpers
          WEBKIT_LIBEXEC=/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
          if [ -d "$WEBKIT_LIBEXEC" ]; then
            mkdir -p AppDir/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
            cp -rL "$WEBKIT_LIBEXEC"/* AppDir/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/
          fi

          # Package with extracted linuxdeploy
          export DEPLOY_GTK_VERSION=3
          export PATH="$PWD:$PATH"
          ./linuxdeploy-extracted/AppRun \
            --appdir AppDir \
            --plugin gtk \
            --desktop-file assets/cellforge.desktop \
            --icon-file assets/icon.png \
            --output appimage

          # Rename output
          mv CellForge*.AppImage ${{ matrix.artifact }}-desktop.AppImage 2>/dev/null || \
          mv cellforge*.AppImage ${{ matrix.artifact }}-desktop.AppImage 2>/dev/null || \
          mv *.AppImage ${{ matrix.artifact }}-desktop.AppImage

      # --- Package: macOS .dmg ---

      - name: Package .dmg (macOS)
        if: matrix.desktop && runner.os == 'macOS'
        continue-on-error: true
        run: |
          # Generate .icns from PNG
          mkdir -p icon.iconset
          sips -z 16 16     assets/icon-1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon-1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon-1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon-1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon-1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon-1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon-1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon-1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon-1024.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon-1024.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

          # Create .app bundle
          APP="build/CellForge.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp target/${{ matrix.target }}/release/cellforge-app "$APP/MacOS/cellforge-app"
          chmod +x "$APP/MacOS/cellforge-app"
          cp icon.icns "$APP/Resources/icon.icns"

          # Write Info.plist (no indentation to avoid whitespace in XML)
          VERSION=${GITHUB_REF_NAME#v}
          cat > "$APP/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleDisplayName</key><string>CellForge</string>
          <key>CFBundleExecutable</key><string>cellforge-app</string>
          <key>CFBundleIdentifier</key><string>com.cellforge.app</string>
          <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
          <key>CFBundleName</key><string>CellForge</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>LSMinimumSystemVersion</key><string>10.13</string>
          </dict>
          </plist>
          EOF

          # Ad-hoc codesign
          codesign --force --sign - "build/CellForge.app"

          # Create .dmg
          brew install create-dmg
          create-dmg \
            --volname "CellForge" \
            --volicon "icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CellForge.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "${{ matrix.artifact }}-desktop.dmg" \
            "build/"

      # --- Sign server binary (macOS) ---

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - target/${{ matrix.target }}/release/${{ matrix.binary }}

      # --- Prepare server artifacts ---

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact }}.exe"
          if (Test-Path "target/${{ matrix.target }}/release/cellforge-app.exe") {
            Copy-Item "target/${{ matrix.target }}/release/cellforge-app.exe" "${{ matrix.artifact }}-desktop.exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.exe
            ${{ matrix.artifact }}-desktop.AppImage
            ${{ matrix.artifact }}-desktop.dmg
            ${{ matrix.artifact }}-desktop.exe
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a GitHub Release when triggered by a tag push; skip on
    # workflow_dispatch runs (those are for validating the build pipeline).
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        # Hashes every artifact so Dockerfile.server (and anyone pulling
        # binaries directly) can verify integrity.
        working-directory: artifacts
        run: |
          sha256sum cellforge-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/cellforge-*
            artifacts/SHA256SUMS
