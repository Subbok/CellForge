name: Build and Push Docker Images

on:
  # Po zakończeniu Release workflow (a nie równolegle z nim — to usuwa race
  # condition gdzie docker-publish startował zanim binarki były w release)
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Ręczny rebuild konkretnej wersji
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag release CellForge do zbudowania (np. v0.5.0)'
        required: true
  # Tygodniowy rebuild dla CVE fixów w base image (lean + AI)
  schedule:
    - cron: '0 3 * * 0'  # niedziela 3:00 UTC
  # Przy zmianie Dockerfile'ów lub tego workflow
  push:
    branches: [main]
    paths:
      - 'Dockerfile.server'
      - 'Dockerfile.server-ai'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  # Owner hardcoded lowercase because docker image refs must be lowercase and
  # github.repository_owner preserves the original casing (Subbok).
  LEAN_IMAGE: subbok/cellforge-server
  AI_IMAGE: subbok/cellforge-server-ai

jobs:
  lean:
    # Jeśli trigger to workflow_run po NIEUDANYM Release, nie buduj
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # id-token: write is required for cosign keyless signing via
      # GitHub's OIDC provider.
      id-token: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      docker_tag: ${{ steps.resolve.outputs.docker_tag }}

    steps:
      - uses: actions/checkout@v6

      # Zwolnienie miejsca na runnerze — GHA ma ~14 GB, multi-arch buildx
      # + uv cache potrafi to zjeść.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag siedzi w różnych miejscach zależnie od triggera:
      # - workflow_dispatch → inputs.tag
      # - workflow_run (po Release na tag pushu) → workflow_run.head_branch
      # - schedule / push main → query latest release via gh CLI
      # Outputs:
      #   tag        = tag release literal (np. v0.5.0) — używany w URL do binarki
      #   docker_tag = stripped v (np. 0.5.0) — używany jako docker image tag,
      #                bo docker/metadata-action auto-strippuje v przy type=semver,
      #                więc ai musi FROM lean:0.5.0 nie :v0.5.0
      - name: Resolve CellForge version tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          # Wrap user-controllable inputs in env vars so the shell sees them as
          # $VAR (not GHA expression-expanded literals) — avoids script injection
          # even though workflow_dispatch + workflow_run are restricted triggers.
          INPUT_TAG: ${{ github.event.inputs.tag }}
          WF_EVENT: ${{ github.event.workflow_run.event }}
          WF_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ "$WF_EVENT" = "push" ] && [[ "$WF_HEAD_BRANCH" == v* ]]; then
            TAG="$WF_HEAD_BRANCH"
          else
            TAG=$(gh release view --json tagName -q .tagName --repo "${{ github.repository }}")
          fi
          if [ -z "$TAG" ]; then
            echo "Could not resolve a CellForge release tag" >&2
            exit 1
          fi
          DOCKER_TAG="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG (docker_tag: $DOCKER_TAG)"

      - name: Extract metadata (lean)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.LEAN_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.resolve.outputs.tag }}
            type=raw,value=latest

      - name: Build and push (lean)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CELLFORGE_VERSION=${{ steps.resolve.outputs.tag }}
          cache-from: type=gha,scope=lean
          cache-to: type=gha,scope=lean,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign lean image (keyless via OIDC)
        # Signs by digest so all tags (semver + latest) that point at this
        # build share a single signature. `--yes` suppresses the interactive
        # Fulcio-cert prompt (OIDC identity is implicit in CI).
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.LEAN_IMAGE }}@${DIGEST}"

  ai:
    needs: lean
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (ai)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.AI_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.lean.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.lean.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.lean.outputs.tag }}
            type=raw,value=latest

      - name: Build and push (ai)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server-ai
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.LEAN_IMAGE }}
            CELLFORGE_VERSION=${{ needs.lean.outputs.docker_tag }}
          cache-from: type=gha,scope=ai
          cache-to: type=gha,scope=ai,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign ai image (keyless via OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.AI_IMAGE }}@${DIGEST}"
