name: Build and Push Docker Image

on:
  # Automatycznie przy każdym nowym release
  release:
    types: [published]
  # Ręcznie z dashboardu Actions (tag jako input)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag obrazu (np. latest, v0.3.0)'
        required: true
        default: 'latest'
  # Automatyczny tygodniowy rebuild (base image CVE fixes)
  schedule:
    - cron: '0 3 * * 0'  # niedziela 3:00 UTC
  # Przy zmianie Dockerfile lub workflow
  push:
    branches: [main]
    paths:
      - 'Dockerfile.server'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cellforge-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Zwolnienie miejsca na runnerze — GHA ma tylko ~14 GB disk,
      # a obraz z PyTorch + CUDA waży ~8-10 GB. Bez tego build pada na "no space left".
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
