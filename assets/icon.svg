<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- App-themed card background. Matches the notebook palette
       (#13141b outer, #161823 inner) used across the CellForge UI. -->
  <rect width="1024" height="1024" rx="192" fill="#13141b"/>
  <rect x="64" y="64" width="896" height="896" rx="144" fill="#161823"/>

  <!-- Glyph: the CellForge favicon from frontend/public/favicon.svg.
       Scaled 24× (favicon viewBox is 24×24 → 576px tall inside the card).
       Centered at x=512, shifted up slightly to leave room for the wordmark. -->
  <g transform="translate(224, 200) scale(24)"
     fill="none" stroke="#7a99ff" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 10H6a4 4 0 0 1-4-4 1 1 0 0 1 1-1h4"/>
    <path d="M7 5a1 1 0 0 1 1-1h13a1 1 0 0 1 1 1 7 7 0 0 1-7 7H8a1 1 0 0 1-1-1z"/>
    <path d="M9 12v5"/>
    <path d="M15 12v5"/>
    <path d="M5 20a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3 1 1 0 0 1-1 1H6a1 1 0 0 1-1-1"/>
  </g>

  <!-- "CellForge" wordmark at the bottom of the card. -->
  <text x="512" y="900"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="104"
        font-weight="600"
        fill="#ebedf2"
        letter-spacing="2">CellForge</text>
</svg>
